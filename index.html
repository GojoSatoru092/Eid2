<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eid Mubarak ❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --gold-pale: rgba(201,168,76,0.15);
      --rose: #c97c8a;
      --cream: #f5ede0;
      --deep: #0d0608;
      --text-muted: rgba(245,237,224,0.55);
      --slide-dur: 0.7s;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: var(--deep); color: var(--cream); font-family: 'Jost', sans-serif; overflow: hidden; }

    #stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    #ambient { position: fixed; inset: 0; z-index: 0; transition: background 1.2s ease; pointer-events: none; }

    .crescent {
      position: fixed; top: -60px; right: -60px;
      width: 260px; height: 260px; border-radius: 50%;
      box-shadow: inset -55px 10px 0 0 var(--gold);
      opacity: 0.12; z-index: 1; pointer-events: none;
      animation: floatCrescent 8s ease-in-out infinite;
    }
    @keyframes floatCrescent {
      0%, 100% { transform: translateY(0px) rotate(-10deg); }
      50% { transform: translateY(18px) rotate(-10deg); }
    }

    .orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; opacity: 0; transition: opacity 1.2s ease, background 1.2s ease; }
    .orb-1 { width: 400px; height: 400px; bottom: -100px; left: -80px; }
    .orb-2 { width: 300px; height: 300px; top: 10%; right: -60px; }

    /* ── Nav ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      display: flex; justify-content: space-between; align-items: center;
      padding: 24px 48px;
    }
    .brand { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 300; letter-spacing: 4px; color: var(--gold-light); text-transform: uppercase; opacity: 0.9; }
    .nav-right { display: flex; align-items: center; gap: 20px; }

    /* ── Language Toggle ── */
    .lang-toggle {
      display: flex;
      border: 1px solid rgba(201,168,76,0.35);
      border-radius: 20px;
      overflow: hidden;
    }
    .lang-btn {
      font-family: 'Jost', sans-serif;
      font-size: 10px; font-weight: 500;
      letter-spacing: 1.5px; text-transform: uppercase;
      padding: 6px 14px;
      border: none; background: transparent;
      color: var(--text-muted);
      cursor: pointer; transition: all 0.3s ease;
    }
    .lang-btn.active { background: var(--gold); color: var(--deep); }

    /* ── Dots ── */
    .dots { display: flex; gap: 10px; align-items: center; }
    .dot { width: 8px; height: 8px; border-radius: 50%; border: 1.5px solid var(--gold); background: transparent; cursor: pointer; transition: all 0.4s ease; opacity: 0.5; }
    .dot.active { background: var(--gold); opacity: 1; transform: scale(1.3); }

    /* ── Scene ── */
    .scene { position: relative; z-index: 5; height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 0 max(48px, 8vw); }

    /* ── Slide ── */
    .slide { display: none; animation: slideIn var(--slide-dur) cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .slide.active { display: block; }
    .slide.exit { display: block; animation: slideOut var(--slide-dur) cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-30px); } }

    .slide-label { font-size: 11px; font-weight: 500; letter-spacing: 5px; text-transform: uppercase; color: var(--gold); margin-bottom: 20px; opacity: 0; animation: fadeUp 0.6s 0.15s ease forwards; }
    .slide-number { display: inline-block; width: 24px; height: 24px; border: 1px solid var(--gold); border-radius: 50%; text-align: center; line-height: 24px; font-size: 10px; margin-right: 12px; vertical-align: middle; }

    h2.slide-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(42px, 6.5vw, 82px); font-weight: 300; line-height: 1.05; margin-bottom: 26px; color: var(--cream); opacity: 0; animation: fadeUp 0.7s 0.25s ease forwards; }
    h2.slide-title em { font-style: italic; color: var(--gold-light); }

    .divider { width: 60px; height: 1px; background: linear-gradient(to right, var(--gold), transparent); margin-bottom: 22px; opacity: 0; animation: fadeUp 0.6s 0.35s ease forwards; }

    .slide-body { font-family: 'Cormorant Garamond', serif; font-size: clamp(17px, 2vw, 22px); font-weight: 300; font-style: italic; line-height: 1.9; color: rgba(245,237,224,0.82); max-width: 640px; opacity: 0; animation: fadeUp 0.7s 0.45s ease forwards; }
    .slide-body strong { font-style: normal; font-weight: 600; color: var(--cream); }

    .signature { margin-top: 32px; font-family: 'Cormorant Garamond', serif; font-size: 26px; font-style: italic; color: var(--gold-light); opacity: 0; animation: fadeUp 0.7s 0.65s ease forwards; }

    /* ── Letter slide ── */
    .letter-wrap { max-width: 680px; opacity: 0; animation: fadeUp 0.8s 0.35s ease forwards; }
    .letter-salutation { font-family: 'Cormorant Garamond', serif; font-size: clamp(15px, 1.7vw, 19px); font-style: italic; color: var(--gold-light); margin-bottom: 14px; }
    .letter-body { font-family: 'Cormorant Garamond', serif; font-size: clamp(14px, 1.55vw, 18px); font-weight: 300; line-height: 2; color: rgba(245,237,224,0.83); }
    .letter-body p { margin-bottom: 12px; }
    .letter-closing { margin-top: 18px; font-family: 'Cormorant Garamond', serif; font-size: clamp(16px, 1.8vw, 20px); font-style: italic; color: var(--gold-light); }
    .letter-closing span { display: block; font-size: clamp(20px, 2.2vw, 26px); font-style: normal; margin-top: 4px; color: var(--cream); }

    /* ── Scroll hint on letter ── */
    .scroll-hint { margin-top: 10px; font-size: 11px; letter-spacing: 2px; color: rgba(201,168,76,0.4); text-transform: uppercase; font-family: 'Jost', sans-serif; }

    /* ── Letter scroll container ── */
    .letter-scroll {
      max-height: 52vh;
      overflow-y: auto;
      padding-right: 8px;
      scrollbar-width: thin;
      scrollbar-color: rgba(201,168,76,0.3) transparent;
    }
    .letter-scroll::-webkit-scrollbar { width: 3px; }
    .letter-scroll::-webkit-scrollbar-track { background: transparent; }
    .letter-scroll::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.35); border-radius: 2px; }

    /* ── Controls ── */
    .controls { position: fixed; bottom: 48px; left: 0; right: 0; display: flex; justify-content: center; gap: 16px; z-index: 10; }
    .btn { font-family: 'Jost', sans-serif; font-size: 13px; font-weight: 400; letter-spacing: 2px; text-transform: uppercase; padding: 14px 32px; border-radius: 2px; border: none; cursor: pointer; transition: all 0.3s ease; }
    .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid rgba(201,168,76,0.25); }
    .btn-ghost:hover { border-color: var(--gold); color: var(--gold-light); background: var(--gold-pale); }
    .btn-primary { background: var(--gold); color: var(--deep); font-weight: 500; }
    .btn-primary:hover { background: var(--gold-light); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(201,168,76,0.3); }

    /* ── Petals ── */
    .petal { position: fixed; border-radius: 50% 50% 50% 0; opacity: 0; pointer-events: none; z-index: 2; animation: petalFall linear infinite; }
    @keyframes petalFall {
      0%   { opacity: 0; transform: translateY(-20px) rotate(0deg); }
      10%  { opacity: 0.35; }
      90%  { opacity: 0.12; }
      100% { opacity: 0; transform: translateY(110vh) rotate(720deg); }
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

    footer { position: fixed; bottom: 16px; left: 0; right: 0; text-align: center; font-size: 11px; letter-spacing: 2px; color: rgba(245,237,224,0.2); z-index: 10; text-transform: uppercase; }
    .progress-bar { position: fixed; bottom: 0; left: 0; height: 2px; background: linear-gradient(to right, var(--gold), var(--rose)); transition: width 0.7s cubic-bezier(0.16,1,0.3,1); z-index: 20; }

    @media (max-width: 700px) {
      html, body { overflow: hidden; }
      nav { padding: 14px 18px; }
      .brand { font-size: 13px; letter-spacing: 2px; }
      .lang-btn { padding: 5px 10px; font-size: 9px; }
      .scene { padding: 0 20px; padding-top: 72px; justify-content: center; }
      .controls { bottom: 30px; gap: 10px; }
      .btn { padding: 11px 18px; font-size: 11px; }
      .slide-body { font-size: 17px; }
      h2.slide-title { font-size: clamp(32px, 10vw, 50px); }
      .letter-body { font-size: 15px; }
      .letter-scroll { max-height: 48vh; }
    }
  </style>
</head>
<body>

<canvas id="stars"></canvas>
<div id="ambient"></div>
<div class="crescent"></div>
<div class="orb orb-1" id="orb1"></div>
<div class="orb orb-2" id="orb2"></div>

<nav>
  <div class="brand">Eid For You ✦</div>
  <div class="nav-right">
    <div class="lang-toggle">
      <button class="lang-btn active" id="btnID" onclick="setLang('id')">ID</button>
      <button class="lang-btn" id="btnEN" onclick="setLang('en')">EN</button>
    </div>
    <div class="dots" id="dots"></div>
  </div>
</nav>

<div class="scene">
  <div id="slideContainer"></div>
</div>

<div class="controls">
  <button class="btn btn-ghost" onclick="prevSlide()" id="prevBtn">← Sebelumnya</button>
  <button class="btn btn-primary" onclick="nextSlide()" id="nextBtn">Berikutnya →</button>
</div>

<div class="progress-bar" id="progressBar"></div>
<footer id="footer">Dibuat dengan perasaan yang tulus · Eid 2025 🌙</footer>

      id:{

        body:"Kamu mungkin tidak menyadarinya, tapi kepedulianmu, usahamu, dan bahkan gestur-gestur kecilmu diam-diam tinggal di hatiku untuk waktu yang sangat lama. Semua itu berarti lebih dari yang bisa kamu bayangkan.",

      },

    },
    {
      ambientLeft:"rgba(60,30,30,0.55)", ambientRight:"rgba(13,6,8,0)",
      orb1:"rgba(180,100,60,0.35)", orb2:"rgba(100,50,80,0.3)",
      id:{
        label:"04 · Hadiah Kecil", title:"Sebuah <em>Hadiah</em> Kecil",
        body:"Aku membuat website kecil ini karena kata-kata di chat kadang tidak cukup untuk mengungkapkan betapa berharganya seseorang bagimu. Jadi aku ingin mencoba sedikit lebih keras — untukmu.",

        label:"04 · A Small Gift", title:"A Small <em>Gift</em>",
        body:"I made this little website because words in chats sometimes cannot fully express how much someone means to you. So I wanted to try a little harder — for you.",

      }

    {
      ambientLeft:"rgba(80,50,20,0.55)", ambientRight:"rgba(13,6,8,0)",
      orb1:"rgba(201,168,76,0.3)", orb2:"rgba(150,80,100,0.3)",
      id:{

        body:"Tidak peduli seberapa sibuknya hidup, aku sungguh berharap kamu selalu bahagia, terlindungi, dan tersenyum. Karena senyummu adalah salah satu hal paling indah yang pernah aku kenal — dan aku tidak mau melewatkan satu pun.",

        label:"05 · Always There", title:"Always <em>There</em>",
        body:"No matter how busy life gets, I genuinely hope you always stay happy, protected, and smiling. Because your smile is one of the most beautiful things I have ever known — and I never want to miss a single one.",
        signature:"Thank you for existing in my life. ✦", isLetter:false
      }
    },
    {
      ambientLeft:"rgba(60,25,55,0.7)", ambientRight:"rgba(20,8,15,0.35)",
      orb1:"rgba(160,80,130,0.5)", orb2:"rgba(201,168,76,0.32)",
      id:{
        label:"06 · Surat Untukmu", title:"Eid <em>Mubarak,</em> Sayang",
        isLetter:true,
        salutation:"Untuk kamu yang selalu ada di pikiranku,",
        letterBody:[
          "Setiap kali Lebaran tiba, selalu ada satu hal yang membuatku lebih bersyukur dari tahun sebelumnya — kehadiranmu. Bukan karena sesuatu yang besar atau dramatis, tapi justru karena hal-hal kecil yang mungkin kamu sendiri tidak sadari.",
          "Cara kamu memperhatikan, bahkan ketika kamu pikir tidak ada yang melihat. Cara kamu mendengarkan dengan sungguh-sungguh, bukan sekadar mendengar. Cara kamu tetap ada bahkan di hari-hari yang terasa berat — bukan dengan kata-kata besar, tapi hanya dengan kehadiranmu yang hangat. Semua itu menetap di hatiku, jauh lebih dalam dari yang bisa aku ungkapkan.",
          "Aku tidak selalu pandai mengatakannya. Tapi di hari yang istimewa ini, aku ingin kamu tahu: kamu bukan sekadar orang yang aku sayangi. Kamu adalah alasan hari-hariku terasa lebih berwarna, lebih berarti. Kamu adalah hal yang aku syukuri dalam doa-doa tersunyiku.",

  ];

  // ══════════════════════════════════════════
  //  State
  // ══════════════════════════════════════════
  let current = 0;
  let lang = 'id';
  let animating = false;

  const ui = {
    id:{ prev:'← Sebelumnya', next:'Berikutnya →', footer:'Dibuat dengan perasaan yang tulus · Eid 2025 🌙' },
    en:{ prev:'← Prev',       next:'Next →',       footer:'Made with genuine feelings · Eid 2025 🌙' }
  };

  // ══════════════════════════════════════════
  //  Starfield
  // ══════════════════════════════════════════
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let stars = [];
  function resizeCanvas(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
  function initStars(){
    stars=[];
    for(let i=0;i<160;i++) stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.4+0.2,speed:Math.random()*0.008+0.003,phase:Math.random()*Math.PI*2});
  }
  function drawStars(t){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    stars.forEach(s=>{
      const a=0.15+0.5*(0.5+0.5*Math.sin(s.phase+t*s.speed));
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(245,237,224,${a})`; ctx.fill();
    });
    requestAnimationFrame(ts=>drawStars(ts/1000));
  }
  resizeCanvas(); initStars(); drawStars(0);
  window.addEventListener('resize',()=>{ resizeCanvas(); initStars(); });

  // ── Petals ──
  (function spawnPetals(){
    for(let i=0;i<14;i++){
      const el=document.createElement('div');
      el.className='petal';
      const size=Math.random()*5+4;
      el.style.cssText=`left:${Math.random()*100}vw;width:${size}px;height:${size*1.6}px;background:var(--gold);animation-duration:${Math.random()*10+12}s;animation-delay:${Math.random()*12}s;`;
      document.body.appendChild(el);
    }
  })();

  // ══════════════════════════════════════════
  //  Build HTML
  // ══════════════════════════════════════════
  function buildSlideHTML(data, idx){
    const s = data[lang];
    const num = idx+1;

    if(s.isLetter){
      const paras = s.letterBody.map(p=>`<p>${p}</p>`).join('');
      return `
        <div class="slide active">
          <div class="slide-label"><span class="slide-number">${num}</span>${s.label}</div>
          <h2 class="slide-title">${s.title}</h2>
          <div class="divider"></div>
          <div class="letter-wrap">
            <div class="letter-scroll">
              <div c
