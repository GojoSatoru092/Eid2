<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0d0608">
<title>Eid Mubarak</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#0d0608;color:#f5ede0;font-family:Georgia,serif}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.g1{position:fixed;width:300px;height:300px;top:-80px;left:-80px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,.13),transparent 70%);pointer-events:none;z-index:0}
.g2{position:fixed;width:250px;height:250px;bottom:-60px;right:-60px;border-radius:50%;background:radial-gradient(circle,rgba(122,59,78,.16),transparent 70%);pointer-events:none;z-index:0}
#pb{position:fixed;top:0;left:0;height:2px;background:linear-gradient(to right,#c9a84c,#e8c97a);z-index:300;transition:width .5s ease;width:0}
nav{position:fixed;top:2px;left:0;right:0;z-index:200;display:flex;justify-content:space-between;align-items:center;padding:12px 18px;background:rgba(13,6,8,.93);border-bottom:1px solid rgba(201,168,76,.2)}
.brand{color:#c9a84c;font-size:10px;letter-spacing:3px}
.nav-r{display:flex;align-items:center;gap:12px}
.ltog{display:flex;border:1px solid rgba(201,168,76,.35);border-radius:20px;overflow:hidden}
.lb{background:transparent;color:rgba(245,237,224,.45);border:none;padding:5px 13px;font-size:10px;letter-spacing:1px;cursor:pointer;font-family:Arial,sans-serif}
.lb.on{background:#c9a84c;color:#0d0608;font-weight:700}
.dots{display:flex;gap:7px;align-items:center}
.dot{width:7px;height:7px;border-radius:50%;border:1.5px solid #c9a84c;background:transparent;cursor:pointer;opacity:.4;transition:all .3s;padding:0;outline:none;-webkit-appearance:none}
.dot.on{background:#c9a84c;opacity:1;transform:scale(1.4)}
#wrap{position:fixed;top:54px;left:0;right:0;bottom:72px;overflow-y:auto;-webkit-overflow-scrolling:touch;z-index:1;padding:28px 20px 20px}
.slide{animation:sup .5s cubic-bezier(.22,1,.36,1) both}
@keyframes sup{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
.orn{display:flex;align-items:center;gap:10px;margin-bottom:18px;animation:fi .5s .1s both}
@keyframes fi{from{opacity:0}to{opacity:1}}
.ol{flex:1;height:1px;background:linear-gradient(to right,transparent,rgba(201,168,76,.3))}
.or{flex:1;height:1px;background:linear-gradient(to left,transparent,rgba(201,168,76,.3))}
.oi{color:#c9a84c;font-size:12px;animation:sh 3s infinite ease-in-out}
@keyframes sh{0%,100%{opacity:.5}50%{opacity:1}}
.lbl{font-family:Arial,sans-serif;font-size:8px;letter-spacing:4px;text-transform:uppercase;color:#c9a84c;margin-bottom:12px;display:flex;align-items:center;gap:8px;animation:fi .5s .1s both}
.snum{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border:1px solid #c9a84c;border-radius:50%;font-size:7px;color:#c9a84c;flex-shrink:0}
h2{font-size:clamp(30px,10vw,50px);font-weight:300;line-height:1.1;margin-bottom:16px;color:#f5ede0;animation:sup .55s .15s cubic-bezier(.22,1,.36,1) both}
h2 em{font-style:italic;color:#e8c97a}
.div{height:1px;background:#c9a84c;margin-bottom:20px;opacity:.55;width:0;animation:dg .7s .3s ease both}
@keyframes dg{from{width:0}to{width:50px}}
.frame{position:relative;padding:22px 18px;border:1px solid rgba(201,168,76,.14);border-radius:2px;background:linear-gradient(135deg,rgba(201,168,76,.04),transparent 60%)}
.frame::before,.frame::after{content:'';position:absolute;width:13px;height:13px;border-color:#c9a84c;border-style:solid;opacity:.4}
.frame::before{top:6px;left:6px;border-width:1px 0 0 1px}
.frame::after{bottom:6px;right:6px;border-width:0 1px 1px 0}
.body{font-size:clamp(15px,4.5vw,18px);font-style:italic;line-height:2;color:rgba(245,237,224,.82);animation:fi .7s .35s both}
.sig{margin-top:24px;font-size:16px;font-style:italic;color:#e8c97a;animation:fi .7s .5s both}
.sal{font-size:13px;font-style:italic;color:#e8c97a;margin-bottom:14px;animation:fi .5s .3s both}
.lbody{font-size:clamp(13px,4vw,15px);font-style:italic;line-height:2.1;color:rgba(245,237,224,.82);animation:fi .7s .35s both}
.lbody p{margin-bottom:12px}
.lclos{margin-top:14px;font-size:13px;font-style:italic;color:#e8c97a;animation:fi .7s .55s both}
.lclos span{display:block;font-size:17px;font-style:normal;margin-top:4px}
.hint{text-align:center;padding-top:18px;font-family:Arial,sans-serif;font-size:8px;letter-spacing:2px;color:rgba(201,168,76,.35);text-transform:uppercase;animation:fi 1s 1.5s both}
.ctrl{position:fixed;bottom:0;left:0;right:0;z-index:200;display:flex;justify-content:center;gap:10px;padding:12px 18px 20px;background:linear-gradient(to top,rgba(13,6,8,.98) 60%,transparent)}
.btn{font-family:Arial,sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:12px 20px;border:none;cursor:pointer;border-radius:2px;min-width:110px;text-align:center;-webkit-appearance:none;appearance:none}
.bg{background:transparent;color:rgba(245,237,224,.45);border:1px solid rgba(201,168,76,.25)}
.bp{background:#c9a84c;color:#0d0608;font-weight:700}
.bg:active{background:rgba(201,168,76,.1);transform:scale(.97)}
.bp:active{background:#e8c97a;transform:scale(.97)}
.ripple{position:fixed;border-radius:50%;pointer-events:none;z-index:50;background:rgba(201,168,76,.2);animation:rip .5s ease-out both}
@keyframes rip{from{transform:scale(0);opacity:.8}to{transform:scale(4);opacity:0}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="g1"></div><div class="g2"></div>
<div id="pb"></div>
<nav>
  <div class="brand">EID FOR YOU &#10022;</div>
  <div class="nav-r">
    <div class="ltog">
      <button class="lb on" id="bID" onclick="setLang('id')">ID</button>
      <button class="lb" id="bEN" onclick="setLang('en')">EN</button>
    </div>
    <div class="dots" id="dots"></div>
  </div>
</nav>
<div id="wrap"><div id="scene"></div></div>
<div class="ctrl">
  <button class="btn bg" id="pb2" onclick="prev()">&#8592; Sebelumnya</button>
  <button class="btn bp" id="nb" onclick="next()">Berikutnya &#8594;</button>
</div>
<script>
var lang='id',cur=0;
var S=[
  {id:{lbl:'01 · Eid Mubarak',ttl:'<em>Eid</em> Mubarak',txt:'Di Hari Raya yang istimewa ini, aku hanya ingin mengingatkanmu betapa berartinya kehadiranmu untukku. Bahkan momen-momen kecil bersamamu terasa begitu bermakna \u2014 seperti keajaiban sunyi yang selalu tinggal di hati.',sig:null,let:false},
   en:{lbl:'01 · Eid Mubarak',ttl:'<em>Eid</em> Mubarak',txt:'This Eid, I just wanted to remind you how special your presence is to me. Even the smallest moments with you feel meaningful \u2014 like quiet magic that always stays.',sig:null,let:false}},
  {id:{lbl:'02 · Hal Kecil',ttl:'Hal Kecil yang <em>Berarti</em>',txt:'Kamu mungkin tidak menyadarinya, tapi kepedulianmu, usahamu, dan bahkan gestur-gestur kecilmu diam-diam tinggal di hatiku untuk waktu yang sangat lama. Semua itu berarti lebih dari yang bisa kamu bayangkan.',sig:null,let:false},
   en:{lbl:'02 · Little Things',ttl:'Little <em>Things</em> Matter',txt:'You may not realise it, but your care, your effort, and even your smallest gestures live quietly in my heart for a very long time. They mean more than you could ever imagine.',sig:null,let:false}},
  {id:{lbl:'03 · Bersamamu',ttl:'Setiap <em>Saat</em> Bersamamu',txt:'Ada sesuatu yang berbeda ketika kamu ada di sekitarku. Dunia terasa lebih hangat, lebih ringan. Tawamu mengisi ruangan dengan cara yang tidak bisa digantikan oleh siapapun. Aku bersyukur setiap harinya.',sig:null,let:false},
   en:{lbl:'03 · Together',ttl:'Every <em>Moment</em> with You',txt:'There is something different when you are around. The world feels warmer, lighter. Your laughter fills the room in a way no one else could. I am grateful for it every single day.',sig:null,let:false}},
  {id:{lbl:'04 · Hadiah Kecil',ttl:'Sebuah <em>Hadiah</em> Kecil',txt:'Aku membuat website kecil ini karena kata-kata di chat kadang tidak cukup untuk mengungkapkan betapa berharganya seseorang bagimu. Jadi aku ingin mencoba sedikit lebih keras \u2014 untukmu.',sig:null,let:false},
   en:{lbl:'04 · A Small Gift',ttl:'A Small <em>Gift</em>',txt:'I made this little website because words in chats sometimes cannot fully express how much someone means to you. So I wanted to try a little harder \u2014 for you.',sig:null,let:false}},
  {id:{lbl:'05 · Selalu Ada',ttl:'Selalu <em>Ada</em>',txt:'Tidak peduli seberapa sibuknya hidup, aku sungguh berharap kamu selalu bahagia, terlindungi, dan tersenyum. Karena senyummu adalah salah satu hal paling indah yang pernah aku kenal.',sig:'Terima kasih sudah ada di hidupku. \u2736',let:false},
   en:{lbl:'05 · Always There',ttl:'Always <em>There</em>',txt:'No matter how busy life gets, I genuinely hope you always stay happy, protected, and smiling. Because your smile is one of the most beautiful things I have ever known.',sig:'Thank you for existing in my life. \u2736',let:false}},
  {id:{lbl:'06 · Surat Untukmu',ttl:'Eid <em>Mubarak,</em> Sayang',let:true,sal:'Untuk kamu yang selalu ada di pikiranku,',
    body:['Setiap kali Lebaran tiba, selalu ada satu hal yang membuatku lebih bersyukur dari tahun sebelumnya \u2014 kehadiranmu. Bukan karena sesuatu yang besar atau dramatis, tapi justru karena hal-hal kecil yang mungkin kamu sendiri tidak sadari.','Cara kamu memperhatikan, bahkan ketika kamu pikir tidak ada yang melihat. Cara kamu mendengarkan dengan sungguh-sungguh, bukan sekadar mendengar. Cara kamu tetap ada bahkan di hari-hari yang terasa berat \u2014 bukan dengan kata-kata besar, tapi hanya dengan kehadiranmu yang hangat.','Aku tidak selalu pandai mengatakannya. Tapi di hari yang istimewa ini, aku ingin kamu tahu: kamu bukan sekadar orang yang aku sayangi. Kamu adalah alasan hari-hariku terasa lebih berwarna, lebih berarti.','Eid ini, aku tidak punya hadiah mewah. Yang aku punya hanya rasa ini \u2014 rasa syukur yang tulus, kasih sayang yang nyata, dan doa yang sungguh-sungguh agar kamu selalu dilindungi, selalu bahagia, dan selalu tahu bahwa kamu dicintai.','Selamat Hari Raya, sayang. Semoga setiap langkahmu selalu dipenuhi cahaya \u2014 dan semoga kamu tahu, aku selalu mendoakanmu.'],
    cl:'Dengan segenap cinta dan ketulusan,',cn:'Selalu untukmu \uD83C\uDF19'},
   en:{lbl:'06 · A Letter',ttl:'Eid <em>Mubarak,</em> Sayang',let:true,sal:'To you, who is always on my mind,',
    body:['Every time Eid arrives, there is one thing that makes me more grateful than the year before \u2014 your presence. Not because of anything grand or dramatic, but because of the small things you might not even notice yourself.','The way you pay attention, even when you think no one is watching. The way you truly listen, not just hear. The way you stay even on the heavy days \u2014 not with grand words, but simply with your warm presence.','I am not always good at saying it. But on this special day, I want you to know: you are not just someone I care for. You are the reason my days feel more vivid, more meaningful.','This Eid, I have no grand gift to offer. What I have is this feeling \u2014 a sincere gratitude, a real love, and a genuine prayer that you are always protected, always happy, and always loved.','Happy Eid, sayang. May every step you take be filled with light \u2014 and may you always know that I am always praying for you.'],
    cl:'With all my love and sincerity,',cn:'Always yours \uD83C\uDF19'}}
];
var ui={id:{p:'\u2190 Sebelumnya',n:'Berikutnya \u2192'},en:{p:'\u2190 Prev',n:'Next \u2192'}};

function render(){
  var s=S[cur][lang],h='';
  h+='<div class="slide">';
  h+='<div class="orn"><div class="ol"></div><span class="oi">\u2736</span><div class="or"></div></div>';
  h+='<div class="lbl"><span class="snum">'+(cur+1)+'</span>'+s.lbl+'</div>';
  h+='<h2>'+s.ttl+'</h2><div class="div"></div>';
  if(s.let){
    h+='<div class="frame"><div class="sal">'+s.sal+'</div><div class="lbody">';
    for(var i=0;i<s.body.length;i++) h+='<p>'+s.body[i]+'</p>';
    h+='</div><div class="lclos">'+s.cl+'<span>'+s.cn+'</span></div></div>';
  } else {
    h+='<div class="frame"><p class="body">'+s.txt+'</p>';
    if(s.sig) h+='<div class="sig">'+s.sig+'</div>';
    h+='</div>';
  }
  if(cur===0) h+='<div class="hint">swipe to navigate</div>';
  h+='</div>';
  document.getElementById('scene').innerHTML=h;
  document.getElementById('wrap').scrollTop=0;

  var d=document.getElementById('dots'); d.innerHTML='';
  for(var j=0;j<S.length;j++){
    var b=document.createElement('button');
    b.className='dot'+(j===cur?' on':'');
    (function(x){b.onclick=function(){go(x)}})(j);
    d.appendChild(b);
  }
  document.getElementById('pb').style.width=(((cur+1)/S.length)*100)+'%';
  document.getElementById('pb2').innerHTML=ui[lang].p;
  document.getElementById('nb').innerHTML=ui[lang].n;
  document.getElementById('bID').className='lb'+(lang==='id'?' on':'');
  document.getElementById('bEN').className='lb'+(lang==='en'?' on':'');
}

function go(i){cur=i;render()}
function next(){go((cur+1)%S.length)}
function prev(){go((cur-1+S.length)%S.length)}
function setLang(l){lang=l;render()}

var tx=0,ty=0,tt=0;
document.addEventListener('touchstart',function(e){var t=e.touches[0];tx=t.clientX;ty=t.clientY;tt=Date.now()},{passive:true});
document.addEventListener('touchend',function(e){
  var t=e.changedTouches[0],dx=t.clientX-tx,dy=t.clientY-ty,dt=Date.now()-tt;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>44&&dt<380){if(dx<0)next();else prev();}
},{passive:true});

document.addEventListener('touchstart',function(e){
  var t=e.touches[0],el=document.createElement('div');
  el.className='ripple';
  el.style.cssText='width:60px;height:60px;left:'+(t.clientX-30)+'px;top:'+(t.clientY-30)+'px';
  document.body.appendChild(el);
  setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el)},520);
},{passive:true});

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight')next();
  if(e.key==='ArrowLeft')prev();
});

(function(){
  var cv=document.getElementById('c'),ctx=cv.getContext('2d'),W,H,P=[];
  function sz(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight}
  function init(){P=[];var n=Math.min(45,Math.floor(W*H/18000));for(var i=0;i<n;i++)P.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.1+.3,vx:(Math.random()-.5)*.15,vy:-Math.random()*.2-.05,l:Math.random()})}
  function tick(){ctx.clearRect(0,0,W,H);for(var i=0;i<P.length;i++){var p=P[i];p.x+=p.vx;p.y+=p.vy;p.l+=.004;var a=Math.sin(p.l*Math.PI)*.55;if(a<0||p.y<-10){p.x=Math.random()*W;p.y=H+10;p.l=0;}ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(201,168,76,'+Math.max(0,a)+')';ctx.fill();}requestAnimationFrame(tick);}
  sz();init();tick();
  window.addEventListener('resize',function(){sz();init();});
})();

render();
</script>
</body>
</html>
